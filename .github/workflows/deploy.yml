name: Frontend Deploy

on:
  push:
    branches:
      - master
    paths:
      - 'Frontend/**'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:

concurrency:
  group: frontend-deploy
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  S3_BUCKET: buylands-frontend
  CLOUDFRONT_DOMAIN: d1qwpdq4cnnwd2.cloudfront.net

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload static assets to S3
        run: |
          aws s3 sync out/ "s3://${{ env.S3_BUCKET }}" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.txt"

      - name: Upload HTML to S3
        run: |
          aws s3 sync out/ "s3://${{ env.S3_BUCKET }}" \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "*.html"

      - name: Invalidate CloudFront cache
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          DIST_ID="${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"
          if [ -z "$DIST_ID" ]; then
            echo "CLOUDFRONT_DISTRIBUTION_ID secret not set; looking up by domain..."
            DIST_ID=$(aws cloudfront list-distributions \
              --query "DistributionList.Items[?DomainName=='${{ env.CLOUDFRONT_DOMAIN }}'].Id | [0]" \
              --output text)
          fi

          if [ -z "$DIST_ID" ] || [ "$DIST_ID" = "None" ]; then
            echo "Error: Could not resolve CloudFront distribution ID."
            echo "Add CLOUDFRONT_DISTRIBUTION_ID to GitHub Actions secrets,"
            echo "or confirm CLOUDFRONT_DOMAIN matches your distribution."
            exit 1
          fi

          echo "Invalidating CloudFront distribution: $DIST_ID"
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*"
